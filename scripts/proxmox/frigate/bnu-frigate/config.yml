ffmpeg:
  hwaccel_args: auto
  input_args: preset-rtsp-restream

detectors:
  detector01:
    type: cpu

# NOTE: the OpenVINO CPU plugin fails to load in this LXC
# ("Failed to create plugin libopenvino_intel_cpu_plugin.so for device CPU" / stoi),
# so we stay on the bundled CPU tflite detector. False positives are addressed via the
# object score filters under `objects:` below instead of by a model swap.
model:
  path: /models/cpu_model.tflite

detect:
  enabled: true
  fps: 2
  stationary:
    interval: 50
    threshold: 50

record:
  enabled: true
  # mode "all" (default: motion) keeps EVERY segment inside an alert/detection window —
  # motion-gated retention was dropping the tail of events (person/car still tracked but
  # motion below threshold), which cut the digest's last clip short. post_capture 10 adds
  # margin past the review end so departures aren't clipped mid-action.
  alerts:
    pre_capture: 5
    post_capture: 10
    retain:
      days: 10
      mode: all
  detections:
    pre_capture: 5
    post_capture: 10
    retain:
      days: 10
      mode: all

snapshots:
  enabled: true


cameras:
  frente_principal:
    ffmpeg:
      hwaccel_args: []
      inputs:
        - path: rtsp://localhost:8554/frente_principal
          roles:
            - detect
    lpr:
      enabled: false
    review:
      genai:
        enabled: true
        activity_context_prompt: Analise estas imagens da câmera de segurança 
          {camera} da minha casa. Use a descrição estruturada abaixo para 
          interpretar a posição dos elementos na imagem. Localização - visão 
          geral da frente da casa, com a casa à esquerda e a rua à direita. 
          Layout - à esquerda fica a casa; no centro-esquerda fica o portão da 
          garagem; no superior-esquerda fica a entrada de pedestres para os 
          fundos, pelo portão na lateral direita da casa; no inferior-esquerda 
          ficam as entradas de pedestres pelas portas principais da frente; à 
          direita fica a rua; no centro fica a passagem compartilhada por 
          veículos e pedestres. Movimento - pessoa se deslocando para a DIREITA 
          da imagem está SAINDO da propriedade em direção à rua; pessoa se 
          deslocando para a ESQUERDA está CHEGANDO da rua em direção à casa. Só 
          afirme direção de deslocamento (chegando/saindo/"em direção a") quando
          o movimento entre os frames mostrar isso claramente; na dúvida, 
          descreva a pessoa caminhando pela passagem SEM afirmar direção. 
          Descreva o que os veículos, pedestres ou animais estão fazendo. Se 
          existem apenas veículo(s) na imagem e eles não mudarem de posição ao 
          longo de todo vídeo, mencione isso (pode ser um falso positivo).
          Veículos - carro se deslocando para a ESQUERDA, em direção ao portão da
          garagem no centro-esquerda, está CHEGANDO e entrando na garagem; carro
          se deslocando para a DIREITA está SAINDO em direção à rua.
          Desaparecimento - o local onde o objeto desaparece dos frames determina
          o destino, e sumir dos frames NÃO significa por si só que saiu para a
          rua; carro que desaparece na região do portão da garagem (centro-
          esquerda) ENTROU NA GARAGEM; carro que desaparece na direita saiu para a
          rua; na dúvida sobre o local do desaparecimento, NÃO afirme destino.

    motion:
      threshold: 29
      contour_area: 32
      improve_contrast: true
      mask:
        - 0.716,0.184,0.759,0.173,0.793,1,0.739,1
        - 0.491,0.009,0.448,0.162,0.641,0.209,0.734,0.182,0.87,0.17,1,0.199,0.999,0
