# ──────────────────────────────────────────────────────────────────────────────
# Family Presence — bnu-homeassistant
# Deploy to: /config/packages/family_presence.yaml
#
# Mirrors the bg-homeassistant approach (a group of the family device_trackers, present
# if ANY member is home) but as a single binary_sensor with a 10-minute off-delay so a
# brief Wi-Fi drop does not flip the house to "empty".
# ──────────────────────────────────────────────────────────────────────────────

template:
  - binary_sensor:
      - name: "Family Present"
        unique_id: bnu_family_present
        device_class: presence
        # ON the instant any member's device is home; the delay_off below keeps it ON
        # for 10 min after the last one leaves (tolerates brief disconnects).
        state: >
          {{ is_state('device_tracker.jorge', 'home')
             or is_state('device_tracker.duda', 'home')
             or is_state('device_tracker.silvana', 'home')
             or is_state('device_tracker.cencis_iphone_15_pro', 'home')
             or is_state('device_tracker.iphone_de_jorge', 'home') }}
        delay_off: "00:10:00"

input_boolean:
  # When ON, Frigate digests are muted while the family is home — and an in-flight
  # digest is cancelled the moment presence is detected (e.g. family arriving).
  frigate_digest_mute_when_home:
    name: "Mute Frigate digest when family home"
    icon: mdi:home-account

input_text:
  # Last presence state actually ANNOUNCED on WhatsApp ("on"/"off"). Written by the
  # notify automation below; lets it dedup by CONTENT instead of filtering edges,
  # so a template reload or HA restart can never swallow a real transition.
  family_presence_last_announced:
    name: "Family presence — last announced state"
    icon: mdi:message-check

rest_command:
  # Generic WhatsApp sender for bnu via the local WAHA (LXC 101 @ 10.1.1.126:3000).
  send_whatsapp_bnu:
    url: "http://10.1.1.126:3000/api/sendText"
    method: POST
    content_type: application/json
    headers:
      X-Api-Key: !secret waha_api_key
    payload: '{"session": "default", "chatId": "{{ jid }}", "text": {{ message | to_json }}}'

automation:
  - alias: "Family presence: notify WhatsApp on change"
    id: family_presence_notify
    trigger:
      - platform: state
        entity_id: binary_sensor.family_present
        to: "on"
        id: arrived
      - platform: state
        entity_id: binary_sensor.family_present
        to: "off"
        id: left
    condition:
      # Dedup by CONTENT, not by edge: announce only when the new state differs from
      # the last state we actually announced. The old guard (from_state in on/off)
      # silently ate a real arrival on 2026-07-12 — a YAML reload recreated the
      # template sensor mid-arrival, so the edge looked like unavailable→on. With
      # content dedup, reloads/restarts can neither swallow a transition (state
      # differs → announces) nor spam duplicates (state matches → suppressed).
      - condition: template
        value_template: >
          {{ states('input_text.family_presence_last_announced') != trigger.to_state.state }}
    action:
      - action: rest_command.send_whatsapp_bnu
        data:
          jid: !secret whatsapp_group_jid
          message: >
            {{ '🏠 Casa Blumenau — a família chegou em casa.'
               if trigger.id == 'arrived'
               else '🚪 Casa Blumenau — casa vazia (a família saiu).' }}
      # Stamp AFTER the send so a failed/skipped send retries on the next edge.
      - action: input_text.set_value
        target:
          entity_id: input_text.family_presence_last_announced
        data:
          value: "{{ trigger.to_state.state }}"
