# ──────────────────────────────────────────────────────────────────────────────
# Ivani Presence — bnu-homeassistant
# Deploy to: /config/packages/ivani_presence.yaml
#
# Ivani is a family employee. Sends a WhatsApp message to the Casa Blumenau group
# when she arrives and when she leaves, gated by input_boolean.notify_ivani_presence
# (master toggle) and optionally by input_boolean.notify_ivani_family_away_only
# (in series: when ON, notify only while the family is NOT home).
# Reuses rest_command.send_whatsapp_bnu (defined in family_presence.yaml —
# rest_commands are global).
# ──────────────────────────────────────────────────────────────────────────────

template:
  - binary_sensor:
      - name: "Ivani Present"
        unique_id: bnu_ivani_present
        device_class: presence
        # No delay_off here: the router device_tracker already debounces departures
        # with its own consider_home delay (300 s), so an extra template delay would
        # stack on top of it and push the "saiu" message ~15 min late.
        state: "{{ is_state('device_tracker.ivani', 'home') }}"

input_boolean:
  notify_ivani_presence:
    name: "Notificar chegada/saída da Ivani"
    icon: mdi:account-badge
    # Master toggle. No `initial:` — HA restores the last value after a restart.

  notify_ivani_family_away_only:
    name: "Notificar Ivani só com família fora"
    icon: mdi:home-export-outline
    # In series with the master toggle: when ON, arrival/departure messages are
    # sent only while binary_sensor.family_present is OFF (nobody of the family
    # home). When OFF, messages are sent regardless of family presence.
    # No `initial:` — HA restores the last value after a restart.

automation:
  - alias: "Ivani presence: notify WhatsApp on change"
    id: ivani_presence_notify
    trigger:
      - platform: state
        entity_id: binary_sensor.ivani_present
        to: "on"
        id: arrived
      - platform: state
        entity_id: binary_sensor.ivani_present
        to: "off"
        id: left
    condition:
      # Master feature toggle
      - condition: state
        entity_id: input_boolean.notify_ivani_presence
        state: "on"
      # Series toggle: when ON, only notify while the family is away.
      - condition: template
        value_template: >
          {{ is_state('input_boolean.notify_ivani_family_away_only', 'off')
             or is_state('binary_sensor.family_present', 'off') }}
      # Ignore startup transitions out of unknown/unavailable (avoids spurious
      # alerts after an HA restart).
      - condition: template
        value_template: "{{ trigger.from_state.state in ['on', 'off'] }}"
    action:
      - action: rest_command.send_whatsapp_bnu
        data:
          jid: !secret whatsapp_group_jid
          message: >
            {{ '🔔 Casa Blumenau — Ivani chegou.'
               if trigger.id == 'arrived'
               else '🚪 Casa Blumenau — Ivani saiu.' }}
