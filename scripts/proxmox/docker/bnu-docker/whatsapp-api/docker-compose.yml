services:
  evolution-api:
    container_name: evolution-api
    image: atendai/evolution-api:v1.8.7
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      - SERVER_PORT=8080
      - SERVER_URL=http://10.1.1.126:8081
      - AUTHENTICATION_API_KEY=${BNU_WHATSAPP_API_KEY}
      - DATABASE_ENABLED=false
      - DEL_INSTANCE=false
    volumes:
      - ./evolution_instances:/evolution/instances
