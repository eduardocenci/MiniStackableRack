# Copyparty config — auto-loaded from /cfg (this folder) by the container.
#
# Format: sections in [brackets], options/flags indented. See
# https://github.com/9001/copyparty#configuration
#
# SECURITY: this file is COMMITTED to git. Do NOT put the real password here.
# The account below uses a placeholder. Put the real password in a sibling file
# named  copyparty.local.conf  (gitignored) that redefines [accounts]; copyparty
# loads *.conf alphabetically, so the local file overrides this one. Example
# copyparty.local.conf:
#
#     [accounts]
#       ed: <your-real-strong-password>
#

[global]
  e2dsa            # index files on disk + watch for changes (enables search)
  e2ts             # read media tags (needs the 'ac' image's ffmpeg)
  theme: 2         # dark theme
  grid             # default to grid/thumbnail view
  name: ply-nas    # shown in the browser tab and UI header
  # Uncomment to keep an access log under /cfg/log on the NAS:
  # lo: /cfg/log/%Y-%m%d.log

[accounts]
  # username: password  — OVERRIDE this password in copyparty.local.conf.
  ed: PLACEHOLDER_CHANGE_ME_IN_copyparty.local.conf

# URL root "/" serves the /w volume (the DSM shared folder from docker-compose).
[/]
  /w
  accs:
    rwmda: ed      # ed: read, write, move, delete, admin (full control)
    # To allow anonymous read-only browsing on the tailnet, add:
    #   r: *

# --- Add more shares by mounting them in docker-compose.yml and mapping here ---
# [/media]
#   /w/media       # or a second volume mounted at e.g. /w2
#   accs:
#     r: *         # everyone on the tailnet can read
#     rwmda: ed    # ed manages it
